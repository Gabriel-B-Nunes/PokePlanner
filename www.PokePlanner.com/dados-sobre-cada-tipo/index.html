<!doctype html>
<html lang = 'pt-BR'>
	<head>
		<meta charset = 'utf-8'/>
		<title>PokePlanner</title>	
		<meta name = 'author' content = 'Gabriel Becker Nunes'/>
		<meta 
		      name = 'description'
		      content = 'PokePlanner é um projeto desenvolvido em html, javascript e css para ajudar os treinadores a montarem suas equipes de pokemons'/>
		<link rel = 'icon' href = 'favicon/favicon.ico'/>
		<link rel = 'stylesheet' href = 'css/stylesheet.css'/>
		<script src = 'script/script.js' defer></script>
	</head>
	<body>
		<div id = 'navibar'>
			<div id = 'div-titulo'>
				<h1>PokePlanner</h1>
				<p>Planeje seu time</p>
			</div>
			<div id = 'div-links'>
				<ul>
					<li><a href = '../escolher-tipos-adequados/index.html'>Escolher tipos adequados</a></li>
					<li><a href = ''>Dados sobre cada tipo</a></li>
					<li><a href = '../localizacao-dos-pokemons/index.html'>Localização dos pokemons</a></li>
				</ul>
			</div>
		</div>
		<div id = 'div-conteudo'>
			<p>Dados sobre cada tipo</p>
			<form id = 'dados-sobre-cada-tipo'>
				<fieldset>
					<legend>Quais tipos quer pesquisar?</legend>
					<div id = 'div-checkbox-tipos'>
						<ul>
							<li>
								<input type = 'checkbox' id = 'bug' name = 'bug'><label for = 'bug'>Bug</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'electr' name = 'electr'><label for = 'electr'>Electr</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'fire' name = 'fire'><label for = 'fire'>Fire</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'grass' name = 'grass'><label for = 'grass'>Grass</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'normal' name = 'normal'><label for = 'normal'>Normal</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'rock' name = 'rock'><label for = 'rock'>Rock</label>
							</li>
						</ul>
						<ul>
							<li>
								<input type = 'checkbox' id = 'dark' name = 'dark'><label for = 'dark'>Dark</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'fairy' name = 'fairy'><label for = 'fairy'>Fairy</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'flying' name = 'flying'><label for = 'flying'>Flying</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'ground' name = 'ground'><label for = 'ground'>Ground</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'poison' name = 'poison'><label for = 'poison'>Poison</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'steel' name = 'steel'><label for = 'steel'>Steel</label>
							</li>
						</ul>
						<ul>
							<li>
								<input type = 'checkbox' id = 'dragon' name = 'dragon'><label for = 'dragon'>Dragon</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'fight' name = 'fight'><label for = 'fight'>Fight</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'ghost' name = 'ghost'><label for = 'ghost'>Ghost</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'ice' name = 'ice'><label for = 'ice'>Ice</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'psychic' name = 'psychic'><label for = 'psychic'>Psychic</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'water' name = 'water'><label for = 'water'>Water</label>
							</li>
						</ul>
					</div>
				</fieldset>
				<fieldset>
					<legend>Quais dados quer ver?</legend>
					<div id = 'div-checkbox-dados'>
						<ul>
							<li>
								<input type = 'checkbox' id = 'doDoubleDamage' name = 'doDoubleDamage'><label for = 'doDoubleDamage'>Causa 2x dano</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'takeHalfDamage' name = 'takeHalfDamage'><label for = 'takeHalfDamage'>Recebe 1/2 dano</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'doHalfDamage' name = 'doHalfDamage'><label for = 'doHalfDamage'>Causa 1/2 dano</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'takeDoubleDamage' name = 'takeDoubleDamage'><label for = 'takeDoubleDamage'>Recebe 2x dano</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'immuneTo' name = 'immuneTo'><label for = 'immuneTo'>É imune</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'cantDamage' name = 'cantDamage'><label for = 'cantDamage'>Não causa dano</label>
							</li>
						</ul>
					</div>
				</fieldset>
				<button id = 'button-processar' type = 'button'>Processar tipos informados</button>
				<button id = 'button-selecionar-todos-tipos' type = 'button'>Selecionar todos os tipos</button>
				<button id = 'button-selecionar-todos-dados' type = 'button'>Selecionar todos os dados</button>
				<button id = 'button-reset' type = 'button'>Limpar seleção</button>
				<fieldset>
					<table id = 'table-resultados'>
					</table>
				</fieldset>
			</form>
		</div>
	</body>
	<footer>
	</footer>
</html>
