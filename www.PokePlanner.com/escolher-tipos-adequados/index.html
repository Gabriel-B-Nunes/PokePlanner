<!doctype html>
<html lang = 'pt-BR'>
	<head>
		<meta charset = 'utf-8'/>
		<title>PokePlanner</title>
		<script src = 'script/script.js' defer></script>
		<meta name = 'author' content = 'Gabriel Becker Nunes'/>
		<meta 
		      name = 'description'
		      content = 'PokePlanner é um projeto desenvolvido em html, javascript e css para ajudar os treinadores a montarem suas equipes de pokemons'/>
		<link rel = 'icon' href = 'favicon/favicon.ico'/>
		<link rel = 'stylesheet' href = 'css/stylesheet.css'/>
	</head>
	<body>
		<div id = 'navibar'>
			<div id = 'div-titulo'>
				<h1>PokePlanner</h1>
				<p>Planeje seu time</p>
			</div>
			<div id = 'div-links'>
				<ul>
					<li><a href = ''>Escolher tipos adequados</a></li>
				</ul>
			</div>
		</div>
		<div id = 'div-conteudo'>
			<p>Escolher tipos adequados</p>
			<form id = 'form-escolher-tipos-adequados'>
				<fieldset>
					<legend>Quais tipos você irá enfrentar?</legend>
					<div id = 'div-checkbox'>
						<ul>
							<li>
								<input type = 'checkbox' id = 'bug' name = 'bug'><label for = 'bug'>Bug</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'electr' name = 'electr'><label for = 'electr'>Electr</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'fire' name = 'fire'><label for = 'fire'>Fire</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'grass' name = 'grass'><label for = 'grass'>Grass</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'normal' name = 'normal'><label for = 'normal'>Normal</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'rock' name = 'rock'><label for = 'rock'>Rock</label>
							</li>
						</ul>
						<ul>
							<li>
								<input type = 'checkbox' id = 'dark' name = 'dark'><label for = 'dark'>Dark</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'fairy' name = 'fairy'><label for = 'fairy'>Fairy</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'flying' name = 'flying'><label for = 'flying'>Flying</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'ground' name = 'ground'><label for = 'ground'>Ground</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'poison' name = 'poison'><label for = 'poison'>Poison</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'steel' name = 'steel'><label for = 'steel'>Steel</label>
							</li>
						</ul>
						<ul>
							<li>
								<input type = 'checkbox' id = 'dragon' name = 'dragon'><label for = 'dragon'>Dragon</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'fight' name = 'fight'><label for = 'fight'>Fight</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'ghost' name = 'ghost'><label for = 'ghost'>Ghost</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'ice' name = 'ice'><label for = 'ice'>Ice</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'psychic' name = 'psychic'><label for = 'psychic'>Psychic</label>
							</li>
							<li>
								<input type = 'checkbox' id = 'water' name = 'water'><label for = 'water'>Water</label>
							</li>
						</ul>
					</div>
					<button type = 'button' id = 'button-processar'>Processar tipos informados</button>
					<button type = 'reset'>Limpar seleção</button>
					<select id = 'tipo-vantagem'>
						<option value = 'doDoubleDamage'>Causa o dobro de dano</option>
						<option value = 'takeHalfDamage'>Recebe metade do dano</option>
						<option value = 'immuneTo'>É imune</option>
					</select>
					<div>
						<p id = 'p-resultado'></p>
					</div>
				</fieldset>
			</form>
		</div>
	</body>
	<footer>
	</footer>
</html>
